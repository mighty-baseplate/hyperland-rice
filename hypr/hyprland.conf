
# ================================================================
#  hyprland.conf
#  personal config — edit freely, break things, fix them
#  comments explain the "why", not just the "what"
#
#  color scheme: catppuccin mocha
#  https://github.com/catppuccin/catppuccin
# ================================================================


################
### MONITORS ###
################

# run `hyprctl monitors` to see your actual monitor names + modes
# format: name, resolution@hz, position, scale
monitor = , 1920x1200, auto, 1

# multi-monitor example (uncomment + adjust):
# monitor = DP-1,  2560x1440@165, 0x0,    1
# monitor = HDMI-A-1, 1920x1080@60, 2560x360, 1


###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$browser     = firefox
$filemanager = dolphin
$launcher    = wofi --show drun --width 600 --height 400 --prompt "search"
$lockscreen  = hyprlock
$colorpicker = hyprpicker -a


#################
### AUTOSTART ###
#################

exec-once = swww-daemon
exec-once = waybar
exec-once = safeeyes

# uncomment as you install these tools:
# exec-once = dunst                                           # notifications
# exec-once = /usr/lib/polkit-kde-authentication-agent-1     # auth popups (kde)
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1  # (gnome)
# exec-once = wl-paste --type text --watch cliphist store    # clipboard history (text)
# exec-once = wl-paste --type image --watch cliphist store   # clipboard history (images)
# exec-once = nm-applet --indicator                          # network tray icon


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

# wayland-native Qt apps (stops them from falling back to X11)
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1

# force wayland for GTK and SDL apps
env = GDK_BACKEND, wayland,x11
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland

# tell portals and apps we're on Hyprland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# electron apps — force wayland ozone platform
env = ELECTRON_OZONE_PLATFORM_HINT, wayland


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 6
    gaps_out = 14

    border_size = 2

    # catppuccin mocha: mauve → lavender gradient
    # swap to blue → sapphire if you want a cooler vibe:
    # col.active_border = rgba(89b4faff) rgba(74c7ecff) 45deg
    col.active_border   = rgba(cba6f7ff) rgba(b4befeff) 45deg
    col.inactive_border = rgba(313244aa)

    # grab window borders and gaps to resize — feels great with a tiling WM
    resize_on_border = true

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding       = 12
    rounding_power = 2

    # subtle transparency on inactive windows — makes it obvious what's focused
    # set both to 1.0 if you hate transparency (fair)
    active_opacity   = 1.0
    inactive_opacity = 0.93
    fullscreen_opacity = 1.0

    shadow {
        enabled        = true
        range          = 20
        render_power   = 4
        color          = rgba(1e1e2e99)
        color_inactive = rgba(1e1e2e55)
        offset         = 0, 4
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        noise             = 0.02
        contrast          = 1.1
        brightness        = 1.0
        vibrancy          = 0.18
        vibrancy_darkness = 0.0
        new_optimizations = true
        xray              = false

        # popups (e.g. right-click menus) also get blur — looks great
        popups            = true
    }
}

animations {
    enabled = true

    # bezier curves — these feel snappy but not jarring
    # tool for previewing curves: https://www.easing.net/
    bezier = snap,          0.19, 1,    0.22, 1
    bezier = smoothOut,     0.36, 0,    0.66, -0.56
    bezier = smoothIn,      0.25, 1,    0.5,  1
    bezier = overshot,      0.05, 0.9,  0.1,  1.05
    bezier = linear,        0,    0,    1,    1
    bezier = md3_decel,     0.05, 0.7,  0.1,  1
    bezier = md3_accel,     0.3,  0,    0.8,  0.15

    # windows: pop in, slide out
    animation = windows,     1, 5, overshot,   slide
    animation = windowsIn,   1, 5, overshot,   popin 80%
    animation = windowsOut,  1, 4, smoothOut,  popin 80%
    animation = windowsMove, 1, 5, snap

    # border color lerp — looks cool with the gradient
    animation = border,      1, 8,  linear
    animation = borderangle, 1, 80, linear,   loop

    # fade
    animation = fade,        1, 4, smoothIn
    animation = fadeIn,      1, 4, smoothIn
    animation = fadeOut,     1, 3, smoothOut
    animation = fadeDim,     1, 4, smoothIn

    # workspace switching feels like sliding pages
    animation = workspaces,  1, 5, md3_decel, slide

    # special workspace (scratchpad) slides in from bottom
    animation = specialWorkspace, 1, 5, md3_decel, slidevert

    # layer surfaces (waybar, wofi, etc) fade in/out
    animation = layers,      1, 3, md3_decel, fade
    animation = layersIn,    1, 3, md3_decel, fade
    animation = layersOut,   1, 2, md3_accel, fade
}

# dwindle layout — the default and honestly the best for most people
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_resizing = true
}

# master layout (SUPER+SHIFT+M to switch if you want to try it)
master {
    new_status = slave
    new_on_top = true
    mfact      = 0.5
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true

    # wake displays when you move the mouse or hit a key
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true

    # resizing and dragging windows have animations too
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true

    # terminal swallows child graphical apps (open mpv from lf → terminal hides)
    # toggle off if it causes issues
    enable_swallow  = true
    swallow_regex   = ^(kitty|alacritty|foot)$

    # don't let apps steal focus when they "want" it
    focus_on_activate = false
}

cursor {
    inactive_timeout = 5   # hide cursor after 5s of no movement
    no_warps         = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us

    # remap caps lock → escape — this is mandatory if you use vim/neovim
    # remove this line if you actually use caps lock for some reason
    kb_options = caps:escape

    follow_mouse  = 1
    mouse_refocus = true
    sensitivity   = 0.0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        drag_lock            = false
        scroll_factor        = 0.8
    }
}

# 3-finger horizontal swipe → switch workspaces
# feels like a phone, which is a good thing
gestures {
    workspace_swipe                    = true
    workspace_swipe_fingers            = 3
    workspace_swipe_distance           = 300
    workspace_swipe_invert             = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio       = 0.5
    workspace_swipe_create_new         = true
    workspace_swipe_forever            = false
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# ── Core ─────────────────────────────────────────────────────────
bind = $mainMod,       Return,    exec, $terminal
bind = $mainMod,       B,         exec, $browser
bind = $mainMod,       E,         exec, $filemanager
bind = $mainMod,       R,         exec, $launcher
bind = $mainMod,       L,         exec, $lockscreen
bind = $mainMod SHIFT, C,         exec, $colorpicker

bind = $mainMod,       C,         killactive
bind = $mainMod SHIFT, M,         exit
bind = $mainMod,       V,         togglefloating
bind = $mainMod,       F,         fullscreen, 0
bind = $mainMod SHIFT, F,         fullscreen, 1        # maximize but keep bar visible
bind = $mainMod,       P,         pseudo                # dwindle pseudotile
bind = $mainMod,       J,         togglesplit           # flip dwindle split direction

# group windows — handy for keeping related windows stacked
bind = $mainMod,       G,         togglegroup
bind = $mainMod,       Tab,       changegroupactive, f
bind = $mainMod SHIFT, Tab,       changegroupactive, b

# ── Screenshots ───────────────────────────────────────────────────
# needs: grimblast (from hyprland extras) or grim + slurp
bind = ,           Print, exec, grimblast --notify copy area
bind = SHIFT,      Print, exec, grimblast --notify copy screen
bind = CTRL,       Print, exec, grimblast --notify copy active
bind = $mainMod,   Print, exec, grimblast --notify save screen ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Clipboard history ─────────────────────────────────────────────
# needs: cliphist + wofi (install with: yay -S cliphist)
# also add the exec-once lines in AUTOSTART above
# bind = $mainMod, grave, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ── Focus movement — arrow keys and vim keys ───────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# ── Move windows ──────────────────────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

# ── Workspaces ────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move window to workspace and follow it
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# move window silently (don't follow it — stays on current workspace)
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5

# cycle through workspaces
bind = $mainMod, bracketright, workspace, e+1
bind = $mainMod, bracketleft,  workspace, e-1
bind = $mainMod, mouse_down,   workspace, e+1
bind = $mainMod, mouse_up,     workspace, e-1

# ── Scratchpad ────────────────────────────────────────────────────
bind = $mainMod,       S, togglespecialworkspace, scratch
bind = $mainMod SHIFT, S, movetoworkspace,        special:scratch

# ── Move/resize with mouse ────────────────────────────────────────
bindm = $mainMod,       mouse:272, movewindow
bindm = $mainMod,       mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

# ── Resize submap ─────────────────────────────────────────────────
# press SUPER+ALT+R to enter resize mode, then use arrow/hjkl keys
# ESC or Enter to leave — way easier than dragging for precise sizes
bind = $mainMod ALT, R, submap, resize

submap = resize
    binde = , right, resizeactive,  30 0
    binde = , left,  resizeactive, -30 0
    binde = , up,    resizeactive,  0 -30
    binde = , down,  resizeactive,  0  30
    binde = , L,     resizeactive,  30 0
    binde = , H,     resizeactive, -30 0
    binde = , K,     resizeactive,  0 -30
    binde = , J,     resizeactive,  0  30
    bind  = , escape, submap, reset
    bind  = , Return, submap, reset
submap = reset

# ── Volume ────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Brightness ────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ── Media ─────────────────────────────────────────────────────────
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bind  = $mainMod, backslash, exec, playerctl play-pause

# ── Waybar toggle ─────────────────────────────────────────────────
# SIGUSR1 hides/shows waybar without restarting it
bind = $mainMod ALT, B, exec, killall -SIGUSR1 waybar


##############################
### WINDOWS AND WORKSPACES ###
##############################

# -- Workspace assignments (uncomment and add your apps) --
# windowrule = workspace 1, class:^(kitty)$
# windowrule = workspace 2, class:^(firefox)$
# windowrule = workspace 3, class:^(code-oss|Code)$
# windowrule = workspace 4, class:^(Spotify|spotify)$
# windowrule = workspace 5, class:^(discord|vesktop)$

# ── Float these — dialogs, settings windows, color pickers ────────
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(org.gnome.Calculator)$
windowrule = float, class:^(org.gnome.Calendar)$
windowrule = float, class:^(file-roller)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save As)(.*)$
windowrule = float, title:^(Save File)(.*)$
windowrule = float, title:^(Confirm)(.*)$
windowrule = float, title:^(Authentication Required)(.*)$
windowrule = float, title:^(Picture.in.Picture)$

# size and center floating windows
windowrule = size   900 600, class:^(pavucontrol)$
windowrule = size   800 500, class:^(blueman-manager)$
windowrule = center, class:^(pavucontrol)$
windowrule = center, class:^(blueman-manager)$
windowrule = center, title:^(Open File)(.*)$
windowrule = center, title:^(Save As)(.*)$

# ── Opacity ────────────────────────────────────────────────────────
# format: opacity <active> <inactive>
# terminal gets slight transparency — everything else stays opaque
windowrule = opacity 0.97 0.90, class:^(kitty)$
windowrule = opacity 0.97 0.90, class:^(Alacritty)$
windowrule = opacity 0.97 0.90, class:^(foot)$

# ── Blur exceptions ────────────────────────────────────────────────
# disabling blur on browsers helps a lot with performance
windowrule = noblur, class:^(firefox)$
windowrule = noblur, class:^(chromium)$
windowrule = noblur, class:^(google-chrome)$

# ── Picture in Picture ─────────────────────────────────────────────
# pin it to the bottom-right corner, always on top
windowrule = float,       title:^(Picture.in.Picture)$
windowrule = pin,         title:^(Picture.in.Picture)$
windowrule = size 480 270, title:^(Picture.in.Picture)$
windowrule = move 100%-490 100%-290, title:^(Picture.in.Picture)$

# ── Steam ──────────────────────────────────────────────────────────
windowrule = float, class:^(steam)$, title:^(Steam Settings)$
windowrule = float, class:^(steam)$, title:^(Friends List)$

# ── Misc fixes ────────────────────────────────────────────────────
# suppress maximize from apps — tiling WMs don't need this
windowrule = suppressevent maximize, class:.*

# fix XWayland drag/drop — without this, dragging in some apps is broken
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
