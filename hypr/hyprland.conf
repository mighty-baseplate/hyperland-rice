
### monitors ###
# run `hyprctl monitors` to see available outputs
monitor = , 1920x1200, auto, 1


### programs ###

$terminal    = kitty
$filemanager = dolphin
$launcher    = wofi --show drun
$lockscreen  = hyprlock


### autostart ###

exec-once = swww-daemon
exec-once = safeeyes
exec-once = waybar

# uncomment once installed:
# exec-once = dunst
# exec-once = /usr/lib/polkit-kde-authentication-agent-1
# exec-once = wl-paste --type text --watch cliphist store
# exec-once = wl-paste --type image --watch cliphist store


### env ###

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = GDK_BACKEND, wayland,x11
env = SDL_VIDEODRIVER, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT, wayland


### look and feel ###

general {
    gaps_in  = 6
    gaps_out = 14
    border_size = 2

    col.active_border   = rgba(cba6f7ff) rgba(b4befeff) 45deg
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 12
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.93
    fullscreen_opacity = 1.0

    shadow {
        enabled      = true
        range        = 20
        render_power = 4
        color        = rgba(1e1e2e99)
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        noise             = 0.02
        contrast          = 1.1
        vibrancy          = 0.18
        new_optimizations = true
        popups            = true
    }
}

animations {
    enabled = true

    bezier = snap,      0.19, 1,   0.22, 1
    bezier = smoothOut, 0.36, 0,   0.66, -0.56
    bezier = smoothIn,  0.25, 1,   0.5,  1
    bezier = overshot,  0.05, 0.9, 0.1,  1.05
    bezier = linear,    0,    0,   1,    1
    bezier = md3_decel, 0.05, 0.7, 0.1,  1
    bezier = md3_accel, 0.3,  0,   0.8,  0.15

    animation = windows,          1, 5, overshot,   slide
    animation = windowsIn,        1, 5, overshot,   popin 80%
    animation = windowsOut,       1, 4, smoothOut,  popin 80%
    animation = windowsMove,      1, 5, snap
    animation = border,           1, 8, linear
    animation = borderangle,      1, 80, linear,    loop
    animation = fade,             1, 4, smoothIn
    animation = fadeIn,           1, 4, smoothIn
    animation = fadeOut,          1, 3, smoothOut
    animation = workspaces,       1, 5, md3_decel,  slide
    animation = specialWorkspace, 1, 5, md3_decel,  slidevert
    animation = layers,           1, 3, md3_decel,  fade
    animation = layersOut,        1, 2, md3_accel,  fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_resizing = true
}

master {
    new_status = slave
    mfact      = 0.5
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    animate_manual_resizes   = true
    enable_swallow           = true
    swallow_regex            = ^(kitty|foot)$
    focus_on_activate        = false
}

cursor {
    inactive_timeout = 5
}


### input ###

input {
    kb_layout  = us
    kb_options = caps:escape

    follow_mouse = 1
    sensitivity  = 0.0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        scroll_factor        = 0.8
    }
}

gestures {
    workspace_swipe         = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert   = true
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new  = true
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


### keybinds ###

$mainMod = SUPER

bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       E,      exec, $filemanager
bind = $mainMod,       R,      exec, $launcher
bind = $mainMod,       L,      exec, $lockscreen

bind = $mainMod,       C,         killactive
bind = $mainMod SHIFT, M,         exit
bind = $mainMod,       V,         togglefloating
bind = $mainMod,       F,         fullscreen, 0
bind = $mainMod SHIFT, F,         fullscreen, 1
bind = $mainMod,       P,         pseudo
bind = $mainMod,       J,         togglesplit
bind = $mainMod,       G,         togglegroup
bind = $mainMod,       Tab,       changegroupactive, f
bind = $mainMod SHIFT, Tab,       changegroupactive, b

# screenshots — needs grimblast
bind = ,           Print, exec, grimblast --notify copy area
bind = SHIFT,      Print, exec, grimblast --notify copy screen
bind = CTRL,       Print, exec, grimblast --notify copy active

# clipboard — needs cliphist + wofi
# bind = $mainMod, grave, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

# workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# silent move (stays on current workspace)
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5

bind = $mainMod, bracketright, workspace, e+1
bind = $mainMod, bracketleft,  workspace, e-1
bind = $mainMod, mouse_down,   workspace, e+1
bind = $mainMod, mouse_up,     workspace, e-1

# scratchpad
bind = $mainMod,       S, togglespecialworkspace, scratch
bind = $mainMod SHIFT, S, movetoworkspace,        special:scratch

# mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# resize submap — SUPER+ALT+R to enter, ESC to leave
bind = $mainMod ALT, R, submap, resize
submap = resize
    binde = , right, resizeactive,  30 0
    binde = , left,  resizeactive, -30 0
    binde = , up,    resizeactive,  0 -30
    binde = , down,  resizeactive,  0  30
    binde = , L,     resizeactive,  30 0
    binde = , H,     resizeactive, -30 0
    binde = , K,     resizeactive,  0 -30
    binde = , J,     resizeactive,  0  30
    bind  = , escape, submap, reset
    bind  = , Return, submap, reset
submap = reset

# volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# media
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bind  = $mainMod, backslash, exec, playerctl play-pause

# waybar — SIGUSR1 hides/shows without restarting
bind = $mainMod ALT, B, exec, killall -SIGUSR1 waybar


### window rules ###

# workspace assignments
# windowrule = workspace 2, class:^(firefox)$
# windowrule = workspace 3, class:^(code-oss)$
# windowrule = workspace 4, class:^(Spotify)$
# windowrule = workspace 5, class:^(discord)$

# float
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(org.gnome.Calculator)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save As)(.*)$
windowrule = float, title:^(Save File)(.*)$
windowrule = float, title:^(Picture.in.Picture)$

# size + center
windowrule = size   900 600, class:^(pavucontrol)$
windowrule = center, class:^(pavucontrol)$
windowrule = center, title:^(Open File)(.*)$
windowrule = center, title:^(Save As)(.*)$

# opacity
windowrule = opacity 0.97 0.90, class:^(kitty)$
windowrule = opacity 0.97 0.90, class:^(foot)$

# no blur on browsers — perf
windowrule = noblur, class:^(firefox)$
windowrule = noblur, class:^(chromium)$

# pip: pin bottom-right
windowrule = float,        title:^(Picture.in.Picture)$
windowrule = pin,          title:^(Picture.in.Picture)$
windowrule = size 480 270, title:^(Picture.in.Picture)$
windowrule = move 100%-490 100%-290, title:^(Picture.in.Picture)$

# steam
windowrule = float, class:^(steam)$, title:^(Steam Settings)$
windowrule = float, class:^(steam)$, title:^(Friends List)$

# fixes
windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
